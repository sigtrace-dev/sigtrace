name: Bug Report
description: File a bug report to help us improve SigTrace
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible so we can reproduce and fix the issue quickly.

        Before submitting, please search [existing issues](https://github.com/sigtrace/sigtrace/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: "🐛 Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "When I do X in the DevTools panel, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "📋 Steps to Reproduce"
      description: "Provide a minimal set of steps that reliably reproduce the issue."
      placeholder: |
        1. Install @sigtrace/vite-plugin and add it to vite.config.ts
        2. Create a signal: `const count = signal(0)`
        3. Open the SigTrace DevTools panel
        4. Click the signal node in the graph
        5. Observe the error in the console: '...'
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "✅ Expected Behavior"
      description: "What did you expect to happen?"
      placeholder: "The signal node should expand and show the current value..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: "❌ Actual Behavior"
      description: "What actually happened? Include any error messages or stack traces."
      placeholder: "The panel crashed with: TypeError: Cannot read properties of undefined..."
    validations:
      required: true

  - type: dropdown
    id: framework
    attributes:
      label: "🧩 Framework"
      description: "Which frontend framework are you using?"
      options:
        - Angular (17+)
        - Vue 3 (Composition API)
        - SolidJS (1.8+)
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: sigtrace-version
    attributes:
      label: "📦 SigTrace Version"
      description: "What version of @sigtrace/core and @sigtrace/vite-plugin are you using? (run `npm list @sigtrace/core`)"
      placeholder: "e.g. 1.1.3"
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: "🖥️ VS Code Version"
      description: "What version of VS Code are you using? (Help → About)"
      placeholder: "e.g. 1.90.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "💻 Operating System"
      description: "What operating system are you running?"
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 11
        - Windows 10
        - Ubuntu / Debian
        - Fedora / RHEL
        - Other Linux
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: "📎 Additional Context"
      description: "Add any other context about the problem — screenshots, screen recordings, links to a minimal reproduction repo, etc."
      placeholder: "Minimal reproduction: https://github.com/..."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "✔️ Checklist"
      options:
        - label: "I have searched existing issues and this is not a duplicate"
          required: true
        - label: "I am using a supported version of SigTrace (1.1.x or 1.0.x)"
          required: true
        - label: "I have included steps to reproduce the issue"
          required: true
