<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SigTrace Reactivity Visualizer</title>
  <style>
    :root {
      --bg: var(--vscode-editor-background, #0f172a);
      --bg2: rgba(255,255,255,0.03);
      --bg3: rgba(255,255,255,0.06);
      --text: var(--vscode-editor-foreground, #e2e8f0);
      --muted: #64748b;
      --border: rgba(255,255,255,0.08);
      --accent: #3b82f6;
      --signal: #3b82f6;
      --memo: #06b6d4;
      --effect: #ec4899;
      --warn: #f59e0b;
      --error: #ef4444;
      --green: #10b981;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; padding:0;
      background:var(--bg); color:var(--text);
      font-family:var(--vscode-font-family,'Segoe UI',system-ui,sans-serif);
      font-size:12px; display:flex; flex-direction:column;
      height:100vh; overflow:hidden;
    }
    header {
      display:flex; align-items:center; justify-content:space-between;
      padding:6px 12px; background:rgba(15,23,42,0.7);
      border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .logo {
      font-size:13px; font-weight:700;
      background:linear-gradient(135deg,#60a5fa,#c084fc);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      display:flex; align-items:center; gap:5px;
    }
    .header-controls { display:flex; align-items:center; gap:6px; }
    .btn {
      background:transparent; border:1px solid var(--border); color:var(--text);
      padding:3px 8px; border-radius:4px; cursor:pointer; font-size:11px;
      display:flex; align-items:center; gap:3px; transition:all 0.15s;
    }
    .btn:hover { background:var(--bg3); }
    .btn.active { background:rgba(239,68,68,0.15); border-color:#ef4444; color:#fca5a5; }
    .tabs-header {
      display:flex; border-bottom:1px solid var(--border);
      flex-shrink:0; background:rgba(15,23,42,0.4);
    }
    .tab-btn {
      flex:1; padding:8px 4px; text-align:center; font-size:11px;
      font-weight:500; color:var(--muted); cursor:pointer; border:none;
      background:none; border-bottom:2px solid transparent; transition:all 0.15s;
      display:flex; align-items:center; justify-content:center; gap:4px;
    }
    .tab-btn:hover { color:var(--text); background:var(--bg2); }
    .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); background:rgba(59,130,246,0.04); }
    .tab-badge {
      background:#ef4444; color:#fff; border-radius:10px;
      padding:0 4px; font-size:8px; font-weight:700;
      display:none; min-width:14px; text-align:center;
    }
    .tab-content { display:none; flex-direction:column; flex:1; min-height:0; overflow:hidden; }
    .tab-content.active { display:flex; }
    .activity-controls {
      display:flex; align-items:center; gap:8px;
      padding:7px 12px; background:var(--bg2);
      border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap;
    }
    .activity-controls input[type="text"] {
      flex:1; min-width:120px; background:rgba(255,255,255,0.04);
      border:1px solid var(--border); border-radius:4px; color:var(--text);
      padding:4px 8px; font-size:11px; outline:none;
    }
    .activity-controls input[type="text"]:focus { border-color:var(--accent); }
    .activity-controls select {
      background:rgba(255,255,255,0.04); border:1px solid var(--border);
      border-radius:4px; color:var(--text); padding:3px 6px;
      font-size:11px; cursor:pointer;
    }
    .inactive-label {
      display:flex; align-items:center; gap:4px;
      color:var(--muted); cursor:pointer; white-space:nowrap; font-size:11px;
    }
    .inactive-label input { accent-color:var(--accent); cursor:pointer; }
    .activity-table-wrap { flex:1; overflow-y:auto; overflow-x:hidden; }
    .activity-table { width:100%; border-collapse:collapse; }
    .activity-table thead { position:sticky; top:0; background:rgba(15,23,42,0.97); z-index:2; }
    .activity-table th {
      text-align:left; padding:5px 8px; font-size:10px; font-weight:600;
      color:var(--muted); text-transform:uppercase; letter-spacing:0.5px;
      border-bottom:1px solid var(--border);
    }
    .signal-row { border-bottom:1px solid rgba(255,255,255,0.025); cursor:pointer; transition:background 0.1s; }
    .signal-row:hover { background:var(--bg2); }
    .signal-row.row-focused { background:rgba(59,130,246,0.09); }
    .signal-row td { padding:5px 8px; vertical-align:middle; }
    .col-name { max-width:160px; }
    .col-component { max-width:120px; color:var(--muted); font-size:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .col-value { max-width:110px; font-family:monospace; font-size:10px; color:#94a3b8; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .col-updates { text-align:center; font-weight:600; font-size:11px; width:60px; }
    .col-updates.hot-count { color:var(--error); }
    .col-activity { width:80px; }
    .signal-name { font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; display:block; max-width:140px; }
    .kind-icon { margin-right:4px; font-size:9px; }
    .kind-signal { color:var(--signal); }
    .kind-memo { color:var(--memo); }
    .kind-effect { color:var(--effect); }
    .spark-bar-wrap { display:flex; align-items:center; height:16px; }
    .spark-bar { height:5px; border-radius:3px; min-width:4px; transition:width 0.3s ease; }
    .spark-zero { color:var(--muted); font-size:10px; }
    .empty-row td { text-align:center; padding:28px 16px; color:var(--muted); font-size:11px; line-height:1.7; }
    .chain-list { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:6px; }
    .chain-card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; overflow:hidden; flex-shrink:0; }
    .chain-header {
      display:flex; align-items:center; gap:6px; padding:7px 10px;
      flex-wrap:wrap; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border);
    }
    .chain-time { color:var(--muted); font-size:10px; font-family:monospace; flex-shrink:0; }
    .chain-trigger-name { font-weight:600; font-size:12px; }
    .chain-component { color:var(--muted); font-size:10px; }
    .chain-value-change { font-family:monospace; font-size:10px; color:var(--green); margin-left:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:130px; }
    .chain-summary { font-size:10px; color:var(--muted); background:var(--bg3); padding:2px 6px; border-radius:10px; white-space:nowrap; }
    .chain-updates { padding:5px 10px; display:flex; flex-direction:column; gap:3px; }
    .chain-update { display:flex; align-items:center; gap:5px; padding:2px 0; }
    .chain-indent { color:var(--muted); font-family:monospace; font-size:10px; }
    .chain-node-name { font-weight:500; font-size:11px; }
    .chain-kind { font-size:10px; color:var(--muted); }
    .chain-duration { font-size:10px; color:var(--muted); font-family:monospace; }
    .chain-update.chain-hot .chain-duration { color:var(--error); font-weight:600; }
    .components-wrap { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:7px; min-height:0; }
    .comp-card { background:var(--bg2); border:1px solid var(--border); border-radius:6px; padding:9px 12px; display:flex; flex-direction:column; gap:4px; }
    .comp-card.comp-hot { border-color:rgba(239,68,68,0.25); }
    .comp-header { display:flex; align-items:center; justify-content:space-between; }
    .comp-name { font-weight:700; font-size:12px; }
    .comp-total { font-size:10px; color:var(--muted); background:var(--bg3); padding:2px 7px; border-radius:10px; }
    .comp-card.comp-hot .comp-total { background:rgba(239,68,68,0.1); color:#fca5a5; }
    .comp-stats { display:flex; gap:10px; }
    .comp-stat { font-size:10px; display:flex; align-items:center; gap:3px; }
    .comp-dead { font-size:10px; color:var(--warn); background:rgba(245,158,11,0.07); padding:4px 8px; border-radius:4px; border-left:2px solid var(--warn); line-height:1.5; word-break:break-all; }
    .comp-info { font-size:10px; color:#94a3b8; }
    .alerts-section { flex-shrink:0; padding:8px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:5px; max-height:180px; overflow-y:auto; }
    .alerts-section-title { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:2px; }
    .alert-card { border-radius:5px; padding:8px 10px; display:flex; flex-direction:column; gap:4px; font-size:11px; }
    .alert-card.warn { background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.2); }
    .alert-card.error { background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.2); }
    .alert-header { display:flex; align-items:center; gap:5px; }
    .alert-title { font-weight:600; }
    .alert-desc { font-size:10px; color:#94a3b8; line-height:1.5; }
    .alert-fix { font-size:10px; color:#cbd5e1; border-left:2px solid var(--muted); padding-left:6px; margin-top:2px; }
    .empty-state { text-align:center; padding:36px 20px; color:var(--muted); font-size:11px; line-height:1.8; }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
    .signal-loc {
      font-size: 9px; color: var(--accent); opacity: 0.85; cursor: pointer;
      background: rgba(59,130,246,0.12); padding: 1px 4px; border-radius: 3px;
      display: inline-block; margin-top: 2px; font-family: monospace;
    }
    .signal-loc:hover { opacity: 1; background: rgba(59,130,246,0.2); }
    .col-name-wrap { display: flex; align-items: center; }
    .loc-wrap { display: flex; }
    .clickable { cursor: pointer; }
    .clickable:hover { text-decoration: underline; color: var(--accent); }
    .details-row { background: rgba(0,0,0,0.18); }
    .details-box { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; border-left: 3px solid var(--accent); }
    .details-meta { display: flex; gap: 20px; font-size: 11px; color: var(--muted); }
    .detail-label { font-weight: 600; color: var(--muted); margin-right: 4px; }
    .detail-val { color: var(--text); }
    .detail-loc-link { color: var(--accent); cursor: pointer; text-decoration: underline; }
    .detail-loc-link:hover { color: #60a5fa; }
    .details-value-wrap { display: flex; flex-direction: column; gap: 4px; }
    .details-value {
      margin: 0; padding: 8px; background: rgba(0,0,0,0.3);
      border: 1px solid var(--border); border-radius: 4px;
      font-family: monospace; font-size: 10px; color: #cbd5e1;
      max-height: 200px; overflow: auto; white-space: pre-wrap; word-break: break-all;
    }
    .chain-value { font-family: monospace; font-size: 10px; color: #94a3b8; background: rgba(0,0,0,0.2); padding: 1px 4px; border-radius: 3px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-left: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="background:none;filter:none;"><path d="m19 8-6 2-6-2M12 2v8M12 22v-6M19 16l-7-3-7 3"/></svg>
      SigTrace
    </div>
    <div class="header-controls">
      <button id="btn-record" class="btn active">&#9679; Rec</button>
      <button id="btn-clear" class="btn">Clear</button>
    </div>
  </header>

  <div class="tabs-header">
    <div class="tab-btn active" data-tab="tab-activity">Activity</div>
    <div class="tab-btn" data-tab="tab-timeline">Timeline</div>
    <div class="tab-btn" data-tab="tab-components">Components <span id="alert-badge" class="tab-badge">0</span></div>
  </div>

  <div id="tab-activity" class="tab-content active">
    <div class="activity-controls">
      <input type="text" id="search-bar" placeholder="Search signals or components...">
      <select id="sort-select">
        <option value="updates">Most Updates</option>
        <option value="recent">Most Recent</option>
        <option value="name">Name A-Z</option>
        <option value="component">Component A-Z</option>
      </select>
      <label class="inactive-label">
        <input type="checkbox" id="inactive-toggle"> Show inactive
      </label>
    </div>
    <div class="activity-table-wrap">
      <table class="activity-table">
        <thead>
          <tr>
            <th>Signal / Computed / Effect</th>
            <th>Component</th>
            <th>Value</th>
            <th style="text-align:center">Updates</th>
            <th>Activity</th>
          </tr>
        </thead>
        <tbody id="activity-table-body">
          <tr class="empty-row">
            <td colspan="5">Waiting for signals...<br>Run your app with SigTrace to begin tracking.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="tab-timeline" class="tab-content">
    <div class="chain-list" id="timeline-chain-list">
      <div class="empty-state">No activity yet.<br>Interact with your app to see causal chains appear here.</div>
    </div>
  </div>

  <div id="tab-components" class="tab-content">
    <div class="components-wrap" id="components-panel">
      <div class="empty-state">No components tracked yet.</div>
    </div>
    <div class="alerts-section" id="alerts-section" style="display:none">
      <div class="alerts-section-title">Issues</div>
      <div id="alerts-panel"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
