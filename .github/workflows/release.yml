name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Publish to npm & VS Code Marketplace
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile all packages
        run: npm run compile

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish @sigtrace/core to npm
        working-directory: packages/core
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Publish @sigtrace/vite-plugin to npm
        working-directory: packages/vite-plugin
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Install vsce (VS Code Extension packager)
        run: npm install -g @vscode/vsce

      - name: Package VS Code extension
        working-directory: packages/extension
        run: vsce package --no-dependencies -o sigtrace-devtools-${{ steps.version.outputs.VERSION }}.vsix

      - name: Publish VS Code extension to marketplace
        working-directory: packages/extension
        run: vsce publish --packagePath sigtrace-devtools-${{ steps.version.outputs.VERSION }}.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_TOKEN }}

      - name: Upload VSIX as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: sigtrace-devtools-vsix
          path: packages/extension/sigtrace-devtools-*.vsix
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "SigTrace ${{ github.ref_name }}"
          body: |
            See [CHANGELOG.md](https://github.com/sigtrace-dev/sigtrace/blob/main/CHANGELOG.md) for full release notes.
          files: packages/extension/sigtrace-devtools-*.vsix
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
